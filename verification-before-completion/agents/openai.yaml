interface:
  display_name: "Verification Before Completion"
  short_description: "Require fresh lifecycle evidence and report missing provenance honestly"
  default_prompt: "Use $verification-before-completion to choose the cheapest sufficient evidence layers, verify the exact installed or deployed path for runtime claims, check every parity dimension, and use precise status language for missing deployment or runtime evidence."

policy:
  allow_implicit_invocation: true
