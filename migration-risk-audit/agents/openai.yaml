interface:
  display_name: "Migration Risk Audit"
  short_description: "Audit migration and upgrade risk before changing code"
  default_prompt: "Use $migration-risk-audit to inspect the proposed migration surface, map blast radius and shared hazards, and recommend the safest sequencing and verification posture before implementation. Keep the audit read-only and hand off to architecture-deepening-audit for depth/seam concerns, systematic-debugging for active failures, or release-readiness once implementation and verification evidence exist."

policy:
  allow_implicit_invocation: true
